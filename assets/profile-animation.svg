<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="100%" height="auto">
  <defs>
    <!-- Grid Gradient -->
    <linearGradient id="grid-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cf6b48" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#cf6b48" stop-opacity="0.25"/>
    </linearGradient>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      @keyframes draw-path {
        to {
          stroke-dashoffset: 0;
        }
      }
      .pulsing-dot {
        animation: pulse 4s infinite ease-in-out;
      }
      .spinning-hub {
        animation: spin 25s infinite linear;
        transform-origin: 750px 160px;
      }
      .floating-text {
        animation: float 5s infinite ease-in-out;
      }
      .draw-wire {
        stroke-dasharray: 200;
        stroke-dashoffset: 200;
        animation: draw-path 4s forwards ease-out;
      }
    </style>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#0d1117" rx="12"/>
  
  <!-- Perspective 3D Grid (Horizontal and Radiating lines) -->
  <g opacity="0.4">
    <!-- Horizon Line -->
    <line x1="0" y1="210" x2="1000" y2="210" stroke="#cf6b48" stroke-width="0.75" opacity="0.3"/>
    <!-- Grid Lines -->
    <path d="M0,230 L1000,230 M0,255 L1000,255 M0,285 L1000,285 M0,320 L1000,320" stroke="#cf6b48" stroke-width="0.5" opacity="0.5"/>
    <!-- Perspective Rays radiating from Horizon Center -->
    <path d="M500,210 L-200,320 M500,210 L50,320 M500,210 L250,320 M500,210 L420,320 M500,210 L580,320 M500,210 L750,320 M500,210 L950,320 M500,210 L1200,320" stroke="#cf6b48" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- Animated Connections (Left & Center Circuits) -->
  <g opacity="0.3">
    <!-- Connecting circuit path to center -->
    <path d="M 80 160 H 300 L 360 210" fill="none" stroke="#64748b" stroke-width="1" class="draw-wire"/>
    <path d="M 450 160 L 520 210" fill="none" stroke="#cf6b48" stroke-width="1" class="draw-wire"/>
    <circle cx="300" cy="160" r="3" fill="#64748b"/>
    <circle cx="360" cy="210" r="3" fill="#cf6b48"/>
  </g>

  <!-- 3D Rotating Network Wireframe Node (Right Side) -->
  <g class="spinning-hub">
    <!-- Concentric orbits -->
    <circle cx="750" cy="160" r="100" fill="none" stroke="#cf6b48" stroke-width="0.5" stroke-dasharray="4, 8" opacity="0.6"/>
    <circle cx="750" cy="160" r="65" fill="none" stroke="#475569" stroke-width="0.5" opacity="0.8"/>
    <circle cx="750" cy="160" r="35" fill="none" stroke="#cf6b48" stroke-width="0.75" opacity="0.4"/>
    
    <!-- Geometric Connector Lines -->
    <line x1="750" y1="160" x2="660" y2="110" stroke="#475569" stroke-width="0.5"/>
    <line x1="750" y1="160" x2="840" y2="210" stroke="#475569" stroke-width="0.5"/>
    <line x1="750" y1="160" x2="690" y2="235" stroke="#cf6b48" stroke-width="0.5"/>
    <line x1="750" y1="160" x2="810" y2="85" stroke="#cf6b48" stroke-width="0.5"/>
    
    <!-- Orbiting Nodes -->
    <circle cx="660" cy="110" r="5" fill="#cf6b48"/>
    <circle cx="840" cy="210" r="5" fill="#64748b"/>
    <circle cx="690" cy="235" r="4" fill="#cf6b48"/>
    <circle cx="810" cy="85" r="4" fill="#cf6b48"/>
    <circle cx="750" cy="60" r="3" fill="#64748b"/>
    <circle cx="750" cy="260" r="3" fill="#64748b"/>
  </g>

  <!-- Central Pulsing Hub Node -->
  <circle cx="750" cy="160" r="9" fill="#cf6b48" class="pulsing-dot"/>
  <circle cx="750" cy="160" r="14" fill="none" stroke="#cf6b48" stroke-width="1.5" class="pulsing-dot" style="animation-delay: 1s;"/>

  <!-- Brand Typography (Left Side) with float animation -->
  <g class="floating-text" transform="translate(80, 0)">
    <!-- Top Tiny Indicator -->
    <rect x="0" y="85" width="8" height="8" rx="2" fill="#cf6b48" class="pulsing-dot"/>
    <text x="18" y="93" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="1.5px">SYSTEMS LAB</text>
    
    <!-- Brand Title -->
    <text x="0" y="145" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="42" font-weight="800" letter-spacing="-1px">Acadify Solution</text>
    
    <!-- Subtitle -->
    <text x="0" y="180" fill="#cf6b48" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="15" font-weight="600" letter-spacing="2.5px">ENGINEERING PARTNER</text>
    
    <!-- Human Copy Intro -->
    <text x="0" y="210" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="400">High-Reliability AI Integration &amp; Product Engineering</text>
  </g>
</svg>
